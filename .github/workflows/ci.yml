name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint is currently informational: some pre-existing frontend files still
      # trip eslint. Once those are cleaned up, drop continue-on-error to make
      # lint a required gate.
      - name: Lint
        run: npx eslint
        continue-on-error: true

      - name: Build
        run: npx next build
        env:
          # Placeholders: the build never contacts these — the Supabase client
          # is lazily constructed and only reads env at request time — but the
          # modules expect the vars to be defined.
          SESSION_SECRET: ci-placeholder-secret
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
